# =============================================================================
# BAUER GROUP — real client IP behind a reverse proxy (Traefik/Coolify)
# =============================================================================
# Restores the real visitor IP from the proxy's X-Forwarded-For header into
# REMOTE_ADDR, so LinkStack sees the correct client. This matters for security:
# LinkStack keys its login brute-force throttle (email|ip) and its API rate
# limit (60/min per ip) on the client IP — without this, every request behind
# the proxy shares the proxy's IP and those limits collapse into one bucket.
#
# The module is loaded by uncommenting its LoadModule line in httpd.conf
# (done in the Dockerfile); this file configures it.
#
# Trust private + loopback ranges: this container only ever receives traffic
# from the internal reverse proxy on the Docker network (port 80 is exposed to
# the Docker network only, never published to the host), so X-Forwarded-For
# cannot be spoofed from outside. mod_remoteip walks X-Forwarded-For right→left
# and selects the first non-trusted address as the client; if the whole chain is
# private (intranet deployments), Apache falls back to the left-most (original)
# entry — correct in both public and intranet setups.
# =============================================================================

RemoteIPHeader X-Forwarded-For

RemoteIPTrustedProxy 127.0.0.1/8
RemoteIPTrustedProxy ::1
RemoteIPTrustedProxy 10.0.0.0/8
RemoteIPTrustedProxy 172.16.0.0/12
RemoteIPTrustedProxy 192.168.0.0/16
RemoteIPTrustedProxy fc00::/7
